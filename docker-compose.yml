services:
  broker:
    image: eclipse-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

  server:
    build: .
    volumes:
      - .:/app
    command: bms-sim-server mqtt://broker/bms_sim
    depends_on:
      - broker
    restart: unless-stopped

  # Development container for writing controller code
  client:
    build: .
    volumes:
      - .:/app
    command: sleep infinity
    depends_on:
      - web
      - server

  web:
    build: ./web
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - broker

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - broker
